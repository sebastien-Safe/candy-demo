  <style>
    :root {
      --rose:#F2D7D9; --rose-deep:#E8BFC2; --rose-light:#FBF0F1;
      --cerise:#C4717A; --cerise-2:#A85860;
      --blanc:#FEFAF9; --ardoise:#3D2B2D; --ardoise-2:#5C3F42;
      --mut:#8C6A6D; --sauge:#7A9E7E; --sauge-2:#5C7D60;
      --line:rgba(61,43,45,.1); --line-2:rgba(61,43,45,.06);
      --alert:#C0392B;
      --ff-disp:'DM Serif Display',serif; --ff-body:'Inter',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--ff-body);background:var(--rose-light);color:var(--ardoise);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}

    nav{position:sticky;top:0;z-index:200;background:rgba(254,250,249,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px}
    .nav-brand{font-family:var(--ff-disp);font-size:1.25rem;color:var(--ardoise);text-decoration:none}
    .nav-badge{font-family:var(--ff-body);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--cerise);color:#fff;padding:3px 8px;border-radius:999px;margin-left:8px}
    .nav-back{font-size:.85rem;color:var(--mut);text-decoration:none;display:flex;align-items:center;gap:5px}
    .nav-back:hover{color:var(--cerise)}

    .page{max-width:980px;margin:0 auto;padding:32px 24px 80px}

    /* ── HERO PATIENT ── */
    .patient-hero{background:var(--blanc);border:1px solid var(--line);border-radius:16px;padding:28px 32px;margin-bottom:24px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center}
    .patient-avatar{width:72px;height:72px;border-radius:50%;background:var(--rose-deep);display:flex;align-items:center;justify-content:center;font-family:var(--ff-disp);font-size:1.8rem;color:var(--cerise-2);flex-shrink:0}
    .patient-hero h1{font-family:var(--ff-disp);font-size:1.7rem;color:var(--ardoise);margin-bottom:4px}
    .patient-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .meta-chip{font-size:.75rem;color:var(--mut);background:var(--rose-light);border:1px solid var(--line);border-radius:6px;padding:3px 9px}
    .secu-block{text-align:right}
    .secu-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:4px}
    .secu-num{font-family:monospace;font-size:1rem;font-weight:700;color:var(--ardoise);letter-spacing:.06em;background:var(--rose-light);border:1px solid var(--line);border-radius:8px;padding:6px 12px}
    .btn-print{font-size:.78rem;color:var(--mut);background:none;border:1px solid var(--line);border-radius:7px;padding:6px 12px;cursor:pointer;margin-top:8px;display:block;text-align:center;transition:all .18s}
    .btn-print:hover{border-color:var(--cerise);color:var(--cerise)}

    /* ── GRID BLOCS ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .grid-full{margin-bottom:18px}

    .bloc{background:var(--blanc);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
    .bloc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line-2)}
    .bloc-title{display:flex;align-items:center;gap:9px;font-weight:700;font-size:.9rem;color:var(--ardoise)}
    .bloc-title .ico{font-size:1.1rem}
    .bloc-edit{font-size:.72rem;color:var(--cerise);cursor:pointer;font-weight:600;background:none;border:none;padding:0}
    .bloc-edit:hover{text-decoration:underline}

    /* ── ÉTAT CIVIL ── */
    .civil-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .civil-row{display:flex;flex-direction:column;gap:2px}
    .civil-label{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
    .civil-val{font-size:.88rem;color:var(--ardoise);font-weight:500}

    /* ── CONSTANTES ── */
    .constantes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .const-card{background:var(--rose-light);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
    .const-val{font-family:var(--ff-disp);font-size:1.6rem;color:var(--ardoise);line-height:1}
    .const-unit{font-size:.7rem;color:var(--mut);margin-left:2px}
    .const-label{font-size:.72rem;color:var(--mut);margin-top:4px}
    .imc-ok{color:var(--sauge-2)}
    .imc-warn{color:var(--cerise)}

    /* ── ALLERGIES ── */
    .allergie-list{display:flex;flex-direction:column;gap:10px}
    .allergie-item{display:flex;align-items:center;gap:12px;background:rgba(192,57,43,.05);border:1px solid rgba(192,57,43,.15);border-left:3px solid var(--alert);border-radius:9px;padding:12px 14px}
    .allergie-icon{font-size:1.2rem;flex-shrink:0}
    .allergie-name{font-weight:700;font-size:.88rem;color:var(--ardoise)}
    .allergie-desc{font-size:.78rem;color:var(--mut);margin-top:2px}
    .allergie-badge{margin-left:auto;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:999px;background:rgba(192,57,43,.1);color:var(--alert);flex-shrink:0}
    .no-allergie{font-size:.88rem;color:var(--sauge-2);display:flex;align-items:center;gap:8px;padding:10px 0}

    /* ── HISTORIQUE ── */
    .histo-list{display:flex;flex-direction:column;gap:0}
    .histo-item{display:grid;grid-template-columns:90px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--line-2);position:relative}
    .histo-item:last-child{border-bottom:none}
    .histo-date{font-size:.78rem;font-weight:600;color:var(--mut);padding-top:2px;text-align:right}
    .histo-body{}
    .histo-type{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
    .histo-type.consult{color:var(--cerise)}
    .histo-type.ordonnance{color:var(--sauge-2)}
    .histo-type.examen{color:#7B68EE}
    .histo-titre{font-size:.88rem;font-weight:600;color:var(--ardoise);margin-bottom:3px}
    .histo-note{font-size:.82rem;color:var(--mut);line-height:1.55}
    .histo-medecin{font-size:.72rem;color:var(--mut);margin-top:4px}

    @media(max-width:700px){
      .patient-hero{grid-template-columns:auto 1fr;gap:16px}
      .secu-block{display:none}
      .grid-2{grid-template-columns:1fr}
      .constantes{grid-template-columns:repeat(3,1fr)}
      .civil-grid{grid-template-columns:1fr}
    }
  
    @media(max-width:600px){
      .patient-hero{grid-template-columns:auto 1fr;gap:14px;padding:20px 18px}
      .patient-hero h1{font-size:1.3rem}
      .secu-block{display:none}
      .grid-2{grid-template-columns:1fr}
      .civil-grid{grid-template-columns:1fr}
      .constantes{grid-template-columns:repeat(3,1fr)}
      .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
      .tab{white-space:nowrap;padding:8px 14px;font-size:.8rem}
      .histo-item{grid-template-columns:1fr}
      .histo-date{text-align:left;margin-bottom:2px}
      .agenda-item{grid-template-columns:1fr;gap:6px}
      .agenda-date-col{text-align:left;display:flex;gap:10px;align-items:center}
      .bloc{padding:16px 14px}
      .page{padding:20px 14px 60px}
      nav{padding:0 16px}
      .patient-avatar{width:52px;height:52px;font-size:1.2rem}
    }
    @media(max-width:380px){
      .constantes{grid-template-columns:1fr 1fr 1fr}
      .const-val{font-size:1.2rem}
      .tabs{gap:0}
      .tab{padding:8px 10px;font-size:.75rem}
    }
  </style>
</head>

function getParam(k) { return new URLSearchParams(window.location.search).get(k); }

function calcIMC(p, t) { return (p / ((t/100)*(t/100))).toFixed(1); }
function imcLabel(i) {
  if (i < 18.5) return { l:'Insuffisance pondérale', cls:'imc-warn' };
  if (i < 25)   return { l:'Corpulence normale', cls:'imc-ok' };
  if (i < 30)   return { l:'Surpoids', cls:'imc-warn' };
  return { l:'Obésité', cls:'imc-warn' };
}

function typeLabel(t) {
  if (t==='consult')    return '<span class="histo-type consult">🩺 Consultation</span>';
  if (t==='ordonnance') return '<span class="histo-type ordonnance">📋 Ordonnance</span>';
  if (t==='examen')     return '<span class="histo-type examen">🔬 Examen / Bilan</span>';
  return '';
}

function graviteColor(g) {
  if (g === 'Sévère') return '#C0392B';
  if (g === 'Modérée') return '#E67E22';
  return '#7A9E7E';
}

}

// ── CRUD localStorage ──────────────────────────────────────────
let _currentPatient = null;

function _getOvKey(pid) { return 'candy_dossier_' + pid; }
function _loadOv(pid)   { return JSON.parse(localStorage.getItem(_getOvKey(pid)) || 'null') || {}; }
function _saveOv(pid, data) {
  const cur = _loadOv(pid);
  localStorage.setItem(_getOvKey(pid), JSON.stringify({ ...cur, ...data }));
}

function applyOverrides(p) {
  const o = _loadOv(p.id);
  return {
    ...p,
    adresse:          o.adresse          ?? p.adresse,
    telephone:        o.telephone        ?? p.telephone,
    email:            o.email            ?? p.email,
    medecin_traitant: o.medecin_traitant ?? p.medecin_traitant,
    poids:            o.poids            ?? p.poids,
    taille:           o.taille           ?? p.taille,
    allergies:   [...(o.allergies_ajouts || []), ...p.allergies],
    historique:  [...(o.historique_ajouts || []), ...p.historique],
  };
}

function rerender() {
  if (_currentPatient) render(applyOverrides(_currentPatient));
}

// ── Modales ──
function _openModal(id) { document.getElementById(id).classList.add('open'); }
function _closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openModalCivil(p) {
  document.getElementById('mc-adresse').value   = p.adresse;
  document.getElementById('mc-tel').value       = p.telephone;
  document.getElementById('mc-email').value     = p.email || '';
  document.getElementById('mc-medecin').value   = p.medecin_traitant;
  _openModal('modal-civil');
}
function saveModalCivil() {
  _saveOv(_currentPatient.id, {
    adresse:          document.getElementById('mc-adresse').value,
    telephone:        document.getElementById('mc-tel').value,
    email:            document.getElementById('mc-email').value,
    medecin_traitant: document.getElementById('mc-medecin').value,
  });
  _closeModal('modal-civil');
  rerender();
}

function openModalConstantes(p) {
  document.getElementById('mco-poids').value  = p.poids;
  document.getElementById('mco-taille').value = p.taille;
  _openModal('modal-constantes');
}
function saveModalConstantes() {
  const poids  = parseFloat(document.getElementById('mco-poids').value);
  const taille = parseInt(document.getElementById('mco-taille').value);
  if (!poids || !taille) { alert('Veuillez saisir le poids et la taille.'); return; }
  _saveOv(_currentPatient.id, { poids, taille });
  _closeModal('modal-constantes');
  rerender();
}

function openModalAllergie(p) {
  ['ma-nom','ma-type','ma-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ma-gravite').value = 'Modérée';
  _openModal('modal-allergie');
}
function saveModalAllergie() {
  const nom = document.getElementById('ma-nom').value.trim();
  if (!nom) { alert('Veuillez saisir le nom de l\'allergène.'); return; }
  const ov = _loadOv(_currentPatient.id);
  const ajouts = ov.allergies_ajouts || [];
  ajouts.unshift({
    nom,
    type:    document.getElementById('ma-type').value || 'Médicament',
    gravite: document.getElementById('ma-gravite').value,
    desc:    document.getElementById('ma-desc').value,
  });
  _saveOv(_currentPatient.id, { allergies_ajouts: ajouts });
  _closeModal('modal-allergie');
  rerender();
}

function openModalHistorique(p) {
  document.getElementById('mh-date').value     = new Date().toISOString().slice(0,10);
  document.getElementById('mh-type').value     = 'consult';
  document.getElementById('mh-titre').value    = '';
  document.getElementById('mh-note').value     = '';
  document.getElementById('mh-medecin').value  = p.medecin_traitant;
  _openModal('modal-historique');
}
function saveModalHistorique() {
  const titre = document.getElementById('mh-titre').value.trim();
  if (!titre) { alert('Veuillez saisir un titre.'); return; }
  const rawDate  = document.getElementById('mh-date').value;
  const dateStr  = rawDate ? new Date(rawDate).toLocaleDateString('fr-FR') : new Date().toLocaleDateString('fr-FR');
  const ov       = _loadOv(_currentPatient.id);
  const ajouts   = ov.historique_ajouts || [];
  ajouts.unshift({
    date:    dateStr,
    type:    document.getElementById('mh-type').value,
    titre,
    note:    document.getElementById('mh-note').value,
    medecin: document.getElementById('mh-medecin').value || 'Dr. Martin',
  });
  _saveOv(_currentPatient.id, { historique_ajouts: ajouts });
  _closeModal('modal-historique');
  rerender();
}

function generateDossierPDF(p) {
  if (typeof window.jspdf === 'undefined') { alert('jsPDF non chargé.'); return; }
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF();
  const pat  = applyOverrides(p);
  const imc  = (pat.poids / ((pat.taille/100)**2)).toFixed(1);
  const today = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});

  // Filigrane
  doc.setFontSize(52); doc.setTextColor(235,235,235);
  for (let y = 50; y < 290; y += 90) doc.text('DÉMONSTRATION', 8, y, {angle:38});

  // Bandeau
  doc.setFillColor(251,240,241); doc.rect(0,0,210,16,'F');
  doc.setFontSize(7); doc.setTextColor(164,88,96);
  doc.text('DOCUMENT DE DÉMONSTRATION — C@NDY — NE PAS UTILISER À DES FINS MÉDICALES', 10, 6);
  doc.setDrawColor(196,113,122); doc.line(0,16,210,16);

  // En-tête patient
  doc.setFontSize(14); doc.setTextColor(61,43,45);
  doc.text(`${pat.nom}, ${pat.prenom}`, 12, 28);
  doc.setFontSize(9); doc.setTextColor(92,63,66);
  doc.text(`Né(e) le ${pat.naissance} — ${pat.age} ans — ${pat.sexe==='F'?'Femme':'Homme'} — Groupe ${pat.groupe_sanguin}`, 12, 35);
  doc.text(`${pat.adresse}`, 12, 41);
  doc.text(`N° SS : ${pat.secu}`, 12, 47);

  // Séparateur
  doc.setDrawColor(196,113,122); doc.setLineWidth(0.5); doc.line(12,52,198,52);
  doc.setFontSize(7); doc.setTextColor(140,106,109);
  doc.text(`Dossier généré le ${today} — Médecin traitant : ${pat.medecin_traitant}`, 12, 57);

  // Constantes
  doc.setFontSize(10); doc.setTextColor(61,43,45); doc.setFont(undefined,'bold');
  doc.text('Constantes', 12, 66);
  doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(92,63,66);
  doc.text(`Poids : ${pat.poids} kg   Taille : ${pat.taille} cm   IMC : ${imc}`, 12, 72);

  // Allergies
  doc.setFontSize(10); doc.setTextColor(61,43,45); doc.setFont(undefined,'bold');
  doc.text('Allergies', 12, 82);
  doc.setFont(undefined,'normal'); doc.setFontSize(9); doc.setTextColor(92,63,66);
  if (pat.allergies.length === 0) {
    doc.text('Aucune allergie connue', 12, 88);
  } else {
    pat.allergies.forEach((a,i) => doc.text(`• ${a.nom} (${a.gravite}) — ${a.desc.slice(0,80)}`, 12, 88+i*6));
  }

  // Historique
  let yPos = 88 + Math.max(1,pat.allergies.length)*6 + 10;
  doc.setFontSize(10); doc.setTextColor(61,43,45); doc.setFont(undefined,'bold');
  doc.text('Historique médical', 12, yPos); yPos += 8;
  doc.setFont(undefined,'normal'); doc.setFontSize(8.5); doc.setTextColor(92,63,66);
  pat.historique.slice(0,10).forEach(h => {
    if (yPos > 270) return;
    doc.setTextColor(196,113,122); doc.text(`${h.date} — ${h.titre}`, 12, yPos); yPos += 5;
    doc.setTextColor(92,63,66);
    const noteLines = doc.splitTextToSize(h.note, 180);
    noteLines.slice(0,2).forEach(l => { if (yPos < 272) { doc.text(l, 14, yPos); yPos += 4.5; } });
    yPos += 2;
  });

  // Pied
  doc.setFontSize(7); doc.setTextColor(180,180,180);
  doc.text('Ce document est une démonstration fictive générée par C@NDY. Toutes les données sont fictives.', 10, 285);

  doc.save(`dossier-demo-${pat.nom.toLowerCase()}-${pat.prenom.toLowerCase()}.pdf`);
}

const id = parseInt(getParam('id'));
const p = PATIENTS_DATA.find(x => x.id === id);
if (p) {
  _currentPatient = p;
  render(applyOverrides(p));
} else {
  document.getElementById('page-content').innerHTML = `
    <div style="text-align:center;padding:60px 0">
      <div style="font-size:2.5rem;margin-bottom:16px">🔍</div>
      <h2 style="font-family:var(--ff-disp);color:var(--ardoise);margin-bottom:8px">Patient introuvable</h2>
      <p style="color:var(--mut);margin-bottom:24px">Ce dossier n'existe pas dans la démo.</p>
      <a href="patients.html" style="color:var(--cerise);font-weight:600">← Retour à la liste</a>
    </div>`;
}
</script>

document.querySelectorAll('.modal-bg').forEach(m => {

});
