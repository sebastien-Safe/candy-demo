<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>C@NDY — Connexion</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C4717A">
<script src="mock-data.js"></script>
<script src="supabase.mock.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<style>
:root{
  --rose:#F2D7D9;--rose-deep:#E8BFC2;--rose-light:#FBF0F1;
  --cerise:#C4717A;--cerise-2:#A85860;
  --blanc:#FEFAF9;--ardoise:#3D2B2D;--mut:#8C6A6D;--mut-2:#5C3F42;
  --line:rgba(61,43,45,.12);--ok:#5C7D60;--alert:#C0392B;
  --ff-disp:'DM Serif Display',serif;--fb:'Inter',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);-webkit-font-smoothing:antialiased}
body{
  background:var(--rose-light);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background:radial-gradient(600px 400px at 80% 20%,rgba(196,113,122,.15),transparent 60%),
    radial-gradient(400px 300px at 10% 80%,rgba(196,113,122,.08),transparent 55%);
  pointer-events:none;
}
.login-wrap{position:relative;z-index:1;width:100%;max-width:400px}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:32px}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--rose-deep),var(--cerise));
  margin-bottom:12px;
}
.logo-mark svg{width:36px;height:36px;fill:#fff}
.logo-title{
  font-family:var(--ff-disp);font-size:2rem;color:var(--ardoise);
  letter-spacing:-.02em;
}
.logo-title span{color:var(--cerise)}
.logo-sub{font-size:.82rem;color:var(--mut);margin-top:3px}

/* ── Card ── */
.card{
  background:var(--blanc);
  border:1px solid var(--line);
  border-radius:20px;
  padding:32px 28px;
  box-shadow:0 8px 32px rgba(61,43,45,.08);
}
.card-title{
  font-family:var(--ff-disp);font-size:1.2rem;color:var(--ardoise);
  margin-bottom:6px;
}
.card-sub{font-size:.84rem;color:var(--mut);margin-bottom:24px}

/* ── Fields ── */
.field{margin-bottom:16px}
.field label{
  display:block;font-size:.72rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--mut);margin-bottom:6px;
}
.field input{
  width:100%;background:var(--rose-light);
  border:1.5px solid var(--line);border-radius:10px;
  padding:11px 14px;font-family:var(--fb);font-size:.92rem;
  color:var(--ardoise);outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--cerise)}
.field input::placeholder{color:var(--mut);opacity:.6}

/* ── Bouton ── */
.btn-login{
  width:100%;
  background:linear-gradient(135deg,var(--cerise),var(--cerise-2));
  color:#fff;border:none;border-radius:10px;
  padding:13px;font-family:var(--ff-disp);font-size:1rem;
  cursor:pointer;transition:all .2s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,113,122,.35)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ── Messages ── */
.msg-error{
  background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);
  border-radius:8px;padding:10px 14px;
  font-size:.84rem;color:var(--alert);margin-bottom:14px;display:none;
}
.msg-error.show{display:block}

/* ── Spinner ── */
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Alerte permission ── */
.msg-perm{
  background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.15);
  border-radius:8px;padding:10px 14px;font-size:.82rem;color:var(--mut-2);
  margin-bottom:16px;display:none;
}
.msg-perm.show{display:block}

/* ── Footer ── */
.footer{text-align:center;margin-top:20px;font-size:.76rem;color:var(--mut)}
.footer a{color:var(--cerise);text-decoration:none}

@media(max-width:480px){
  .card{padding:24px 18px}
  .logo-title{font-size:1.7rem}
}
</style>
</head>
<body>

<div class="login-wrap">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <!-- Croix médicale -->
        <rect x="13" y="4"  width="10" height="28" rx="3"/>
        <rect x="4"  y="13" width="28" height="10" rx="3"/>
      </svg>
    </div>
    <div class="logo-title">C<span>@</span>NDY</div>
    <div class="logo-sub">Dossier patient numérique</div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="card-title">Connexion</div>
    <div class="card-sub">Accès réservé au personnel médical autorisé</div>

    <!-- Alerte permission -->
    <div class="msg-perm" id="msg-perm">
      ⚠️ Accès non autorisé. Contactez votre administrateur.
    </div>

    <!-- Erreur -->
    <div class="msg-error" id="msg-error"></div>

    <!-- Formulaire (démo : mot de passe unique) -->
    <div class="field">
      <label>Mot de passe de démonstration</label>
      <input id="password" type="password" placeholder="••••••••"
        autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Se connecter</span>
    </button>
  </div>

  <div class="footer">
    C@NDY &mdash; Données médicales sécurisées &mdash;
    <a href="https://safe-digitalisation.fr" target="_blank">S@FE Digitalisation</a>
  </div>
</div>

<script>
// Démo hors-ligne : la porte d'accès est un simple mot de passe de démo
// stocké en sessionStorage — aucune vérification réseau n'est faite.
const DEMO_PASSWORD = 'candy-demo';

// Vérifier si déjà "connecté" à la démo
(() => {
  if (sessionStorage.getItem('demo_auth') === 'true') {
    window.location.href = 'patients.html';
    return;
  }
  // Afficher l'alerte de permission si besoin
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'permission') {
    document.getElementById('msg-perm').classList.add('show');
  }
})();

// Soumission sur Entrée
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('msg-error');

  errEl.classList.remove('show');

  if (!password) {
    errEl.textContent = 'Veuillez renseigner le mot de passe de démonstration.';
    errEl.classList.add('show');
    return;
  }

  if (password === DEMO_PASSWORD) {
    sessionStorage.setItem('demo_auth', 'true');
    window.location.href = 'patients.html';
    return;
  }

  errEl.textContent = 'Mot de passe incorrect.';
  errEl.classList.add('show');
}
</script>
</body>
</html>
