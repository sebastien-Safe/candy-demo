<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[ candy-e ] — Mot de passe oublié</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icons/favicon-512.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">

  <link rel="stylesheet" href="../src/styles/main.css" />

  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      padding: var(--space-4);
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: var(--space-8);
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
      text-align: center;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--color-primary), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -1px;
    }

    .login-title {
      font-size: var(--text-2xl);
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .login-title span { color: var(--color-primary); }

    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .login-error {
      background: var(--color-danger-light);
      color: var(--color-danger-dark, #991b1b);
      border: 1px solid var(--color-danger);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      display: none;
    }

    .login-error.visible { display: block; }

    .login-success {
      background: var(--color-success-light, #d1fae5);
      color: var(--color-success-dark, #065f46);
      border: 1px solid var(--color-success, #10b981);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      display: none;
    }

    .login-success.visible { display: block; }

    .login-footer {
      margin-top: var(--space-6);
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-4);
    }

    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .btn--loading .btn-spinner { display: inline-block; }
    .btn--loading .btn-label   { display: none; }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- Marque -->
      <div class="login-brand">
        <div class="login-logo">ce</div>
        <div>
          <div class="login-title">[ <span>candy-e</span> ]</div>
          <div class="login-subtitle">Mot de passe oublié</div>
        </div>
      </div>

      <!-- Formulaire -->
      <form class="login-form" id="forgot-form" novalidate>

        <!-- Message d'erreur -->
        <div class="login-error" id="forgot-error" role="alert"></div>

        <!-- Message de succès -->
        <div class="login-success" id="forgot-success" role="status"></div>

        <p style="font-size: var(--text-sm); color: var(--color-text-muted); margin: 0;">
          Renseignez votre adresse e-mail. Si un compte existe, un lien de réinitialisation vous sera envoyé.
        </p>

        <!-- Email -->
        <div class="form-group">
          <label class="label" for="email">Adresse e-mail</label>
          <div class="input-wrapper">
            <span class="input-wrapper__icon" aria-hidden="true">✉</span>
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="prenom.nom@etablissement.fr"
              required
            />
          </div>
        </div>

        <!-- Bouton -->
        <button type="submit" class="btn btn--primary btn--full btn--lg" id="btn-submit">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Envoyer le lien de réinitialisation</span>
        </button>

        <div style="text-align:center;">
          <a href="login.html" style="font-size:var(--text-sm); color:var(--color-text-muted);">← Retour à la connexion</a>
        </div>

      </form>

      <!-- Pied de page -->
      <div class="login-footer">
        Infrastructure auto-hébergée · Réseau local interne uniquement<br />
        En cas de problème, contacter l'administrateur système.
      </div>

    </div>
  </div>

  <script type="module">
    import { requestPasswordReset } from '../src/core/auth.js';

    const form      = document.getElementById('forgot-form');
    const btnSubmit = document.getElementById('btn-submit');
    const errorEl   = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');

    function setLoading(v) {
      btnSubmit.classList.toggle('btn--loading', v);
      btnSubmit.disabled = v;
    }

    function showError(msg) {
      successEl.classList.remove('visible');
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    function showSuccess(msg) {
      errorEl.classList.remove('visible');
      successEl.textContent = msg;
      successEl.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      if (!email) {
        showError('Veuillez renseigner votre adresse e-mail.');
        return;
      }

      setLoading(true);
      try {
        await requestPasswordReset(email);
      } catch (err) {
        // On ne révèle jamais si l'email existe ou non côté message.
        console.error('[candy-e] Erreur reset password :', err?.message);
      } finally {
        setLoading(false);
        form.querySelector('#email').disabled = true;
        btnSubmit.disabled = true;
        showSuccess('Si un compte existe avec cet e-mail, un lien de réinitialisation vient d\'être envoyé. Pensez à vérifier vos spams.');
      }
    });
  </script>

</body>
</html>
