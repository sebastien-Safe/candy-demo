<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[ candy-e ] — Réinitialisation du mot de passe</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icons/favicon-512.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">

  <link rel="stylesheet" href="../src/styles/main.css" />

  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      padding: var(--space-4);
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: var(--space-8);
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
      text-align: center;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--color-primary), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -1px;
    }

    .login-title {
      font-size: var(--text-2xl);
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .login-title span { color: var(--color-primary); }

    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .login-error {
      background: var(--color-danger-light);
      color: var(--color-danger-dark, #991b1b);
      border: 1px solid var(--color-danger);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      display: none;
    }

    .login-error.visible { display: block; }

    .login-success {
      background: var(--color-success-light, #d1fae5);
      color: var(--color-success-dark, #065f46);
      border: 1px solid var(--color-success, #10b981);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      display: none;
    }

    .login-success.visible { display: block; }

    .login-footer {
      margin-top: var(--space-6);
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-4);
    }

    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .btn--loading .btn-spinner { display: inline-block; }
    .btn--loading .btn-label   { display: none; }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- Marque -->
      <div class="login-brand">
        <div class="login-logo">ce</div>
        <div>
          <div class="login-title">[ <span>candy-e</span> ]</div>
          <div class="login-subtitle">Nouveau mot de passe</div>
        </div>
      </div>

      <!-- Lien invalide / expiré -->
      <div id="invalid-block" style="display:none;">
        <div class="login-error visible" role="alert">
          Ce lien de réinitialisation est invalide ou a expiré.
        </div>
        <div style="text-align:center; margin-top: var(--space-4);">
          <a href="forgot-password.html" class="btn btn--primary btn--full btn--lg">Demander un nouveau lien</a>
        </div>
      </div>

      <!-- Formulaire nouveau mot de passe -->
      <form class="login-form" id="reset-form" style="display:none;" novalidate>

        <div class="login-error" id="reset-error" role="alert"></div>
        <div class="login-success" id="reset-success" role="status"></div>

        <!-- Nouveau mot de passe -->
        <div class="form-group">
          <label class="label" for="password">Nouveau mot de passe</label>
          <div class="input-wrapper">
            <span class="input-wrapper__icon" aria-hidden="true">🔒</span>
            <input
              class="input"
              type="password"
              id="password"
              name="password"
              autocomplete="new-password"
              placeholder="8 caractères minimum"
              minlength="8"
              required
            />
          </div>
        </div>

        <!-- Confirmation -->
        <div class="form-group">
          <label class="label" for="password-confirm">Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <span class="input-wrapper__icon" aria-hidden="true">🔒</span>
            <input
              class="input"
              type="password"
              id="password-confirm"
              name="password-confirm"
              autocomplete="new-password"
              placeholder="••••••••"
              minlength="8"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--lg" id="btn-submit">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Enregistrer le nouveau mot de passe</span>
        </button>

      </form>

      <!-- Chargement initial -->
      <div id="loading-block" style="text-align:center; color: var(--color-text-muted); font-size: var(--text-sm);">
        Vérification du lien en cours…
      </div>

      <!-- Pied de page -->
      <div class="login-footer">
        Infrastructure auto-hébergée · Réseau local interne uniquement<br />
        En cas de problème, contacter l'administrateur système.
      </div>

    </div>
  </div>

  <script type="module" src="../src/pages/reset-password.page.js"></script>

</body>
</html>
